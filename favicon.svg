(function () {
  var STORAGE_KEY = 'amurgid_cookie_consent';

  try {
    if (localStorage.getItem(STORAGE_KEY)) return;
  } catch (e) {
    // localStorage недоступен (приватный режим и т.п.) — просто не показываем баннер повторно в рамках сессии
    return;
  }

  function init() {
    var banner = document.createElement('div');
    banner.className = 'cookie-banner';
    banner.setAttribute('role', 'region');
    banner.setAttribute('aria-label', 'Уведомление об использовании cookie');
    banner.innerHTML =
      '<div class="cookie-banner-inner">' +
        '<p>Сайт использует файлы cookie и сервисы веб-аналитики, чтобы работать корректнее и понимать, что улучшать. ' +
        'Продолжая пользоваться сайтом, вы соглашаетесь с <a href="privacy.html">политикой конфиденциальности</a>.</p>' +
        '<button type="button" class="btn btn-primary cookie-banner-btn">Понятно</button>' +
      '</div>';

    document.body.appendChild(banner);

    var btn = banner.querySelector('.cookie-banner-btn');
    btn.addEventListener('click', function () {
      try { localStorage.setItem(STORAGE_KEY, '1'); } catch (e) {}
      banner.remove();
    });
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', init);
  } else {
    init();
  }
})();
